version: '3.8'

services:
  # Tabular ML Lab web app
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tabular-ml-lab
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - AUTH_HEADER=${AUTH_HEADER:-X-Remote-User}
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount for persistent session data (optional)
      - ./data:/app/data
    networks:
      - ml-network
    restart: unless-stopped
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Local Ollama instance (for testing - school will provide their own)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-backend
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ml-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ml-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local
