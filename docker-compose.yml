version: '3.8'

services:
  # Tabular ML Lab web app
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tabular-ml-lab
    ports:
      - "8501:8501"
    environment:
      - VLLM_URL=${VLLM_URL:-http://vllm:8000}
      - VLLM_MODEL=${VLLM_MODEL:-}
      - OLLAMA_URL=${OLLAMA_URL:-}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - COMPUTE_PROFILE=${COMPUTE_PROFILE:-enterprise}
      - PYTHONUNBUFFERED=1
    volumes:
      # Persistent session data (optional)
      - ./data:/app/data
      # Mount secrets.toml for KeyCloak OIDC auth.
      # Copy secrets.toml.example → secrets.toml and fill in your values.
      - ./.streamlit/secrets.toml:/app/.streamlit/secrets.toml:ro
    networks:
      - ml-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Local Ollama instance (legacy / fallback — vLLM is the recommended backend)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-backend
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ml-network
    restart: unless-stopped
    profiles:
      - ollama  # Only starts with: docker-compose --profile ollama up
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ml-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local
